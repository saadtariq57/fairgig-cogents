name: fairgig-cogents

# Set PUBLIC_URL to your server's public address before deploying,
# e.g.  PUBLIC_URL=http://your-server.com  docker compose up -d
# Defaults to localhost for quick local testing via Nginx.

services:
  auth:
    build: ./services/auth
    container_name: fairgig-auth
    env_file: ./services/auth/.env
    environment:
      FRONTEND_ORIGIN: ${PUBLIC_URL:-http://localhost}
    restart: unless-stopped
    networks: [fairgig]

  earnings:
    build: ./services/earnings
    container_name: fairgig-earnings
    env_file: ./services/earnings/.env
    environment:
      FRONTEND_ORIGIN: ${PUBLIC_URL:-http://localhost}
      AUTH_SERVICE_URL: http://auth:8001
    volumes:
      - earnings-uploads:/app/uploads
    depends_on: [auth]
    restart: unless-stopped
    networks: [fairgig]

  anomaly:
    build: ./services/anomaly
    container_name: fairgig-anomaly
    env_file: ./services/anomaly/.env
    environment:
      FRONTEND_ORIGIN: ${PUBLIC_URL:-http://localhost}
    restart: unless-stopped
    networks: [fairgig]

  grievance:
    build: ./services/grievance
    container_name: fairgig-grievance
    env_file: ./services/grievance/.env
    environment:
      FRONTEND_ORIGIN: ${PUBLIC_URL:-http://localhost}
      AUTH_SERVICE_URL: http://auth:8001
    depends_on: [auth]
    restart: unless-stopped
    networks: [fairgig]

  analytics:
    build: ./services/analytics
    container_name: fairgig-analytics
    env_file: ./services/analytics/.env
    environment:
      FRONTEND_ORIGIN: ${PUBLIC_URL:-http://localhost}
      GRIEVANCE_SERVICE_URL: http://grievance:8004
    depends_on: [grievance]
    restart: unless-stopped
    networks: [fairgig]

  certificate:
    build: ./services/certificate
    container_name: fairgig-certificate
    env_file: ./services/certificate/.env
    environment:
      FRONTEND_ORIGIN: ${PUBLIC_URL:-http://localhost}
      EARNINGS_SERVICE_URL: http://earnings:8002
      AUTH_SERVICE_URL: http://auth:8001
    depends_on: [earnings, auth]
    restart: unless-stopped
    networks: [fairgig]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_AUTH_URL: ""
        NEXT_PUBLIC_EARNINGS_URL: ""
        NEXT_PUBLIC_ANOMALY_URL: ""
        NEXT_PUBLIC_GRIEVANCE_URL: ""
        NEXT_PUBLIC_ANALYTICS_URL: ""
        NEXT_PUBLIC_CERTIFICATE_URL: ""
    container_name: fairgig-frontend
    depends_on:
      - auth
      - earnings
      - anomaly
      - grievance
      - analytics
      - certificate
    restart: unless-stopped
    networks: [fairgig]

  nginx:
    image: nginx:alpine
    container_name: fairgig-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth
      - earnings
      - anomaly
      - grievance
      - analytics
      - certificate
    restart: unless-stopped
    networks: [fairgig]

networks:
  fairgig:
    driver: bridge

volumes:
  earnings-uploads:
