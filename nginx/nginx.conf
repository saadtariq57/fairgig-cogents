server {
    listen 80;

    # Docker's embedded DNS — forces per-request re-resolution so nginx
    # never holds stale upstream IPs after containers restart.
    resolver 127.0.0.11 valid=5s;
    resolver_timeout 3s;

    # ------------------------------------------------------------------ #
    # API services — routed by path prefix                                #
    # Each prefix maps 1-to-1 with the service's own route namespace.     #
    # ------------------------------------------------------------------ #

    location /auth/ {
        set $upstream http://auth:8001;
        proxy_pass         $upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /auth-health {
        set $upstream http://auth:8001;
        proxy_pass         $upstream/health;
        proxy_set_header   Host $host;
    }

    location /shifts/ {
        client_max_body_size 20M;
        set $upstream http://earnings:8002;
        proxy_pass         $upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /verifications/ {
        client_max_body_size 20M;
        set $upstream http://earnings:8002;
        proxy_pass         $upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /workers/ {
        set $upstream http://earnings:8002;
        proxy_pass         $upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $upstream http://earnings:8002;
        proxy_pass         $upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /anomalies/ {
        set $upstream http://anomaly:8003;
        proxy_pass         $upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /grievances/ {
        set $upstream http://grievance:8004;
        proxy_pass         $upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /analytics/ {
        set $upstream http://analytics:8005;
        proxy_pass         $upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /certificate/ {
        set $upstream http://certificate:8006;
        proxy_pass         $upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------ #
    # Frontend (Next.js) — catch-all                                       #
    # ------------------------------------------------------------------ #

    location / {
        set $upstream http://frontend:3000;
        proxy_pass         $upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
